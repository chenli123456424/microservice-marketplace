server:
  port: 8081
  tomcat:
    # 增加HTTP请求头大小限制（单位：字节，50MB = 52428800字节）
    max-http-header-size: 52428800
    # 增加HTTP POST请求大小限制
    max-http-post-size: 52428800

spring:
  application:
    name: user-service # 服务名称
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    url: jdbc:mysql://localhost:3307/ecommerce_user?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.qq.com  # SMTP服务器地址（QQ邮箱使用smtp.qq.com）
    port: 587  # SMTP端口
    username: 1758006511@qq.com  # 发送方邮箱（用于发送验证码的系统邮箱）
    password: whciopkjpjxxddaj  # 发送方邮箱的授权码（不是登录密码）
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    # 注意：上面的邮箱只是作为发送方，用户可以使用任意邮箱接收验证码
  data:
    redis:
      host: localhost
      port: 6379
  main:
    allow-circular-references: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true
  # 增加HTTP请求体和响应体大小限制
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
    mapper-locations: classpath*:mapper/*.xml
    global-config:
        db-config:
            id-type: auto

app:
  jwt:
      secret: C#fB&v2@zL8qR9pW*sE$hN7gY!uM4jK3aG6dF5tH2bV1nJ0cZ_xL-kP+oI>uY<t
  mail:
      sender-name: 筑家智选  # 发件人显示名称（用户看到的发件人名称，可自定义修改）
  account:
      cancellation:
          waiting-period-enabled: false  # 是否启用注销等待期（false-直接删除，true-等待3天后删除）
          waiting-days: 3  # 注销等待天数（等待期内可撤销）

logging:
